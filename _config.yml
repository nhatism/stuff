# Site settings
title:          nhatism's stuff
description:    ""
baseurl:        "/stuff"
url:            "https://nhatism.github.io"


# Author
author:
  name:         nhatism
  url:          https://nhatism.github.io
  email:        

# Build settings
markdown:       kramdown
include:
  - _pages
  - images

# Assets
sass:
  sass_dir:     _sass
  style:        compressed

# Gems
plugins:
  - jekyll-feed
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-remote-theme

  # - jemoji #Uncomment this to allow emoji in your post

# Permalinks
permalink:      /:year-:month-:day/:title
paginate:       36

# Excludes
exclude: [ Gemfile, Gemfile.lock, tale.gemspec ]


remote_theme: chesterhow/tale

