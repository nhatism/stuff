<div class="catalogue-item">
  {% if include.sticky == 'true' %}
  <span class="catalogue-pinned">Pinned &middot;</span>
  {% endif %}
  <a href="{{ post.url | prepend: site.baseurl }}" class="catalogue-title">{{ post.title }}</a>

  <p>
    {% if post.excerpt_separator %}
      {{ post.excerpt | strip_html | truncatewords: 10 }}
    {% else %}
      {{ post.content | strip_html | truncatewords: 10 }}
    {% endif %}
  </p>
</div>
